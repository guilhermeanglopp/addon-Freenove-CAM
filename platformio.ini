; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default

; Serial do Arduino: onde aparece no PC
; - Placa com UM só chip USB–UART (CH340, etc.): ROM + sketch saem na MESMA porta COM.
;   Use CDC desligado (linha seguinte) — é o caso típico quando vê "ESP-ROM" no monitor.
; - Só USB nativo do S3 / porta "USB JTAG/serial": comente a linha CDC=0 e descomente CDC=1.
build_flags = -DARDUINO_USB_CDC_ON_BOOT=0
; build_flags = -DARDUINO_USB_CDC_ON_BOOT=1
